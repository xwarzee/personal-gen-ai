name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7
          terraform_wrapper: false   # laisse `terraform -chdir`/version -json intacts

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats
          pip install --quiet checkov

      - name: Static — terraform fmt
        run: make fmt

      - name: Static — terraform validate (4 stacks)
        run: make validate

      - name: Static — shellcheck + bash -n
        run: make lint

      - name: Unit — bats (dispatcher + bootstrap)
        run: make unit

      - name: Plan mocké — terraform test
        run: make tftest

      - name: Sécurité — checkov
        run: make sec
